name: Marlin Auto Build - MKS Monster8 V2

on:
  # Trigger when you push changes to build files
  push:
    paths:
      - 'builds/**'
      - '.github/workflows/**'
  # Allow manual trigger from Actions tab
  workflow_dispatch:
  # Trigger every night at 03:30 UTC to check for new Marlin updates
  schedule:
    - cron: '30 3 * * *'

jobs:
  create_builds:
    runs-on: ubuntu-latest
    steps:
    - uses: zisismaras/marlin_auto_build@v1
